<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedulify - Notifications</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='navbar.css') }}?v=1.2">
    <link rel="stylesheet" href="{{ url_for('static', filename='notification.css') }}?v=1.2"> 
</head>
<body>

<header class="navbar">
    <div class="logo">Schedulify</div>
    <nav class="nav-buttons">
        <button class="{% if request.endpoint == 'book' %}active{% endif %}" onclick="location.href='{{ url_for('book') }}'">Book Appointment</button>
        <button class="{% if request.endpoint == 'appointments' %}active{% endif %}" onclick="location.href='{{ url_for('appointments') }}'">My Appointments</button>
        <button class="{% if request.endpoint == 'cancellation' %}active{% endif %}" onclick="location.href='{{ url_for('cancellation') }}'">Cancel Appointment</button>       
        <button class="{% if request.endpoint == 'notification' %}active{% endif %}" onclick="location.href='{{ url_for('notification') }}'" style="position: relative !important;">
    Notification
    {% if session.get('student_has_unread_notif') != False %}
        <span class="nav-notif-badge" style="position: absolute !important; top: 4px !important; right: 4px !important; width: 8px !important; height: 8px !important; background-color: #ef4444 !important; border-radius: 50% !important; box-shadow: 0 0 6px #ef4444 !important; display: block !important; z-index: 999 !important;"></span>
    {% endif %}
</button>               
        <button class="{% if request.endpoint == 'feedback' %}active{% endif %}" onclick="location.href='{{ url_for('feedback') }}'">Feedback</button>
        <button class="{% if request.endpoint == 'profile' %}active{% endif %}" onclick="location.href='{{ url_for('profile') }}'">Profile</button>
    </nav>
</header>

    <main class="content">
        <h1 class="page-title">Notifications</h1>

        <div class="notification-container">
            <div class="notification-list">
                {% if notifications %}
                    {% for item in notifications %}
                        <div class="notif-card">
                            <div class="notif-body">
                                <div class="status-dot" style="background-color: {{ item.dot_color }};"></div>
                                <p class="notification-text-message">{{ item.message }}</p>
                            </div>
                            <div class="notif-date">
                                {{ item.date }}
                            </div>
                        </div>
                    {% endfor %}
                {% else %}
                    <div class="empty-notifications-state">
                        <p>Your inbox is clear! No active notifications or reminders at this time.</p>
                    </div>
                {% endif %}
            </div>
            
            {% if notifications %}
                <div class="scroll-arrow">▼</div>
            {% endif %}
        </div>
    </main>

</body>
</html>
