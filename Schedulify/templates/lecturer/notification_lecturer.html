<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedulify - Notifications</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='notification_lecturer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='navbar_lecturer.css') }}">
</head>
<body>

<header class="navbar">
    <div class="logo">Schedulify</div>
    <nav class="nav-buttons">
        <button class="{% if request.endpoint == 'manage' %}active{% endif %}" onclick="location.href='{{ url_for('manage') }}'">Manage Appointment</button>
        <button class="{% if request.endpoint == 'block' %}active{% endif %}" onclick="location.href='{{ url_for('block') }}'">Block Slot</button>
        <button class="{% if request.endpoint == 'manage_blocked' %}active{% endif %}" onclick="location.href='{{ url_for('manage_blocked') }}'">Manage Blocked Slot</button>
        <button class="{% if request.endpoint == 'appointments' %}active{% endif %}" onclick="location.href='{{ url_for('appointments') }}'">My Appointment</button>
        <button class="{% if request.endpoint == 'history' %}active{% endif %}" onclick="location.href='{{ url_for('history') }}'">Appointment History</button>
        <button class="{% if request.endpoint == 'notifications_lecturer' %}active{% endif %}" onclick="location.href='{{ url_for('notifications_lecturer') }}'">Notification</button>
        <button class="{% if request.endpoint == 'feedback_lecturer' %}active{% endif %}" onclick="location.href='{{ url_for('feedback_lecturer') }}'">Feedback</button>
        <button class="{% if request.endpoint == 'profile_lecturer' %}active{% endif %}" onclick="location.href='{{ url_for('profile_lecturer') }}'">Profile</button>
    </nav>
</header>

    <main class="content">
        <h1 class="page-title">Notifications</h1>

        <div class="notification-container">
            <div class="notification-list">
                {% if notifications %}
                    {% for alert in notifications %}
                        <div class="notif-card">
                            <div class="notif-body">
                                <span class="status-dot" style="background-color: {{ alert.dot_color }}; display: inline-block; width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;"></span>
                                <p>{{ alert.message }}</p>
                            </div>
                            <div class="notif-date">{{ alert.date }}</div>
                        </div>
                    {% endfor %}
                {% else %}
                    <div class="notif-card" style="justify-content: center; padding: 40px;">
                        <p style="color: #94a3b8; font-style: italic; text-align: center;">You have no active notification updates logged at this time.</p>
                    </div>
                {% endif %}
            </div>
            
            <div class="scroll-arrow">▼</div>
        </div>
    </main>

</body>
</html>
