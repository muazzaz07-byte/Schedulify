<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedulify - Notifications</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='notification.css') }}">
</head>
<body>

<header class="navbar">
    <div class="logo">Schedulify</div>
    <nav class="nav-buttons">
        <button onclick="location.href='{{ url_for('book') }}'">Book Appointment</button>
        <button onclick="location.href='{{ url_for('appointments') }}'">My Appointments</button>
        <button onclick="location.href='{{ url_for('cancellation') }}'">Cancellation Appoint</button>
        <button class="active" onclick="location.href='{{ url_for('notification') }}'">Notification</button>
        <button onclick="location.href='{{ url_for('feedback') }}'">Feedback</button>
        <button onclick="location.href='/profile'">Profile</button>
    </nav>
</header>

<main class="content">
    <h1 class="page-title">Notifications</h1>

    <div class="notification-container">
        <div class="notification-list">
            {% if notifications %}
                {% for notif in notifications %}
                <div class="notif-card">
                    <div class="notif-body">
                        <span class="status-dot {{ notif.category }}"></span>
                        <p>{{ notif.message }}</p>
                    </div>
                    <div class="notif-date">{{ notif.created_at }}</div>
                </div>
                {% endfor %}
            {% else %}
                <p style="text-align: center; color: #888; margin-top: 20px;">No new notifications.</p>
            {% endif %}
        </div>
        
        <div class="scroll-arrow">▼</div>
    </div>
</main>

</body>
</html>
