<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Schedulify Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2 class="logo">Schedulify</h2>

        <button>Dashboard</button>
        <button>View Availability</button>
        <button>Appointment</button>
        <button>Appointment history</button>
        <button>Notification Reminder</button>
        <button>Appointment Cancellation</button>
        <button class="active">Feedback</button>
        <button>Profile</button>
    </div>

    <!-- Main Content -->
    <div class="main">
        <h1>Feedback</h1>

        <div class="card">
            <h2>Help us improve our service for you</h2>

            <div class="form-container">

                <!-- Left -->
                <div class="left">
                    <p>How would you like to describe our meeting today?</p>
                    <div class="emoji">
                        😆 😐 😮 😢
                    </div>
                    <textarea placeholder="Write your feedback..."></textarea>
                </div>

                <!-- Divider -->
                <div class="divider"></div>

                <!-- Right -->
                <div class="right">
                    <p>On a scale 1 to 10, how satisfied are you with meetings using Schedulify?</p>
                    <input type="number" min="1" max="10" placeholder="Enter rating">
                </div>

            </div>

            <button class="submit-btn">Submit Feedback</button>
        </div>
    </div>

</div>

</body>
</html>
