<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedulify - Register</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <h1 class="logo">Schedulify</h1>
        <div class="card">
            <h2>Create account</h2>
            <form action="manage.html">
                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>

                <div class="input-group">
                    <label style="display: block; font-size: 12px; color: #6b7280; margin-bottom: 5px; text-align: left;">Security Question</label>
                    <select class="select-style" required>
                        <option value="" disabled selected>Select a question</option>
                        <option>What is your pet's name?</option>
                        <option>What is your mother's maiden name?</option>
                        <option>What city were you born in?</option>
                    </select>
                    <input type="text" placeholder="Your answer" required style="margin-top: 10px;">
                </div>

                <button type="submit" class="btn-primary">Sign up</button>
            </form>
            <p class="footer-text">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>
</body>
</html>
