<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedulify - Notification Reminder</title>
    <link rel="stylesheet" href="notification.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <h1 class="sidebar-logo">Schedulify</h1>
            <nav class="nav-menu">
                <a href="#" class="nav-item">View Availability</a>
                <a href="#" class="nav-item">Appointment</a>
                <a href="#" class="nav-item">Appointment history</a>
                <a href="#" class="nav-item active">Notification Reminder</a>
                <a href="#" class="nav-item">Appointment Cancellation</a>
                <a href="#" class="nav-item">Feedback</a>
                <a href="#" class="nav-item">Profile</a>
            </nav>
        </aside>

        <main class="main-content">
            <h2 class="page-title">Notification Reminder</h2>
            
            <div class="reminder-card">
                <div class="bell-wrapper">
                    <img src="https://img.icons8.com/emoji/96/000000/bell-emoji.png" alt="Bell Icon" class="bell-img">
                </div>
                
                <div class="reminder-text">
                    <p>You have an upcoming appointment</p>
                    <p class="appointment-details">with Mrs. Wahida at 4:30 p.m.</p>
                </div>
            </div>

            <footer class="footer">
                <p>© 2026 Schedulify Inc. All rights reserved</p>
            </footer>
        </main>
    </div>

</html>
