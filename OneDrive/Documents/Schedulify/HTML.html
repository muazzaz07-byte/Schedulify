<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedulify Dashboard</title>
    <link rel="stylesheet" href="style.dashboard.css">
</head>
<body>

    <div class="main-container">
        <div class="header">
            <div class="logo-section">
                <span class="logo-icon"></span>
                <span class="logo-text">Schedulify</span>
            </div>
        </div>

        <div class="dashboard-title-box">
            <h1>Dashboard</h1>
        </div>

        <div class="button-grid">
            <button class="btn">View Availability</button>
            <button class="btn">Appointment</button>
            <button class="btn">Appointment History</button>
            
            <button class="btn">Notification Reminder</button>
            <button class="btn">Appointment Cancellation</button>
            <button class="btn">Feedback</button>
            
            <div class="profile-container">
                <button class="btn">Profile</button>
            </div>
        </div>
    </div>

</body>
</html>
